<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sida2</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="nav-brand">Sida2</div>
      <button class="nav-toggle" aria-label="Toggle navigation">&#9776;</button>
      <ul class="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="home" class="hero">
      <h1>Welcome to Sida2</h1>
      <p>A responsive site that works on web and mobile.</p>
    </section>

    <section id="about" class="section">
      <h2>About</h2>
      <p>This project is set up for development and testing in Visual Studio Code, with support for both desktop and mobile viewports.</p>
    </section>

    <section id="contact" class="section">
      <h2>Contact</h2>
      <p>Get in touch via the form below.</p>
      <form class="contact-form">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required />
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required />
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" placeholder="Your message" required></textarea>
        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Sida2</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
